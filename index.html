<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Cooperaciones PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #eef2f7;
  margin: 0;
}

header {
  background: #2c3e50;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
}

.container {
  padding: 20px;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 20px;
  box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
}

input {
  padding: 10px;
  width: 100%;
  margin-bottom: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  padding: 10px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #3498db;
  color: white;
}

button:hover {
  background: #2980b9;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: #34495e;
  color: white;
}

td, th {
  padding: 8px;
  text-align: center;
}

tr:nth-child(even) {
  background: #f2f2f2;
}

.progreso {
  background: #ddd;
  border-radius: 20px;
  overflow: hidden;
}

.barra {
  height: 25px;
  background: green;
  color: white;
  text-align: center;
  line-height: 25px;
}


tfoot {
  background: #2c3e50;
  color: white;
  font-weight: bold;
}

#totalGeneral {
  color: #00ffcc;
  font-size: 16px;
}


/* 🔥 Fila de totales fija */
tfoot {
  position: sticky;
  bottom: 0;
  background: #2c3e50;
  color: white;
  font-weight: bold;
  z-index: 2;
}

</style>

<body>

<header>Colonia Juquilita Sección 7</header>

<div class="container">

<div class="card">
<input type="text" id="buscador" placeholder="🔍 Buscar por nombre...">

<button onclick="exportarExcel()">📥 Excel</button>
<button onclick="exportarPDF()">📄 PDF</button>

<table id="miTabla">
<thead>
<tr>
<th>No.</th>
<th>Nombre</th>
<th>Cooperación</th>
<th>Efectivo</th>
<th>Depósito</th>
<th>Total</th>
</tr>
</thead>

<tbody id="tabla"></tbody>

<tfoot>
<tr id="filaTotales">
<td></td>
<td><strong>TOTALES</strong></td>
<td id="totalC"></td>
<td id="totalE"></td>
<td id="totalD"></td>
<td id="totalGeneral"></td>
</tr>
</tfoot>

</table>

</div>

<div class="card">
<h3 id="totales"></h3>
</div>

<div class="card">
<h3>Progreso</h3>
<div class="progreso">
<div id="barraProgreso" class="barra">0%</div>
</div>
</div>

<div class="card">
<canvas id="grafica"></canvas>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "cooperaciones-juquilita.firebaseapp.com",
  projectId: "cooperaciones-juquilita"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const tabla = document.getElementById("tabla");
const meta = 661154.46;

let datosGlobales = [];
let chart;

const formato = (num) => num.toLocaleString('es-MX', {
  style: 'currency',
  currency: 'MXN'
});

onSnapshot(collection(db, "cooperaciones"), (snapshot) => {
  datosGlobales = [];

  snapshot.forEach(doc => {
    datosGlobales.push(doc.data());

  });
  renderTabla(datosGlobales);
});

function renderTabla(datos) {
  let filas = "";
  let totalC = 0, totalE = 0, totalD = 0;
  let contador = 1;

  datos.forEach(d => {
    const cooperacion = Number(d.cooperacion) || 0;
    const efectivo = Number(d.efectivo) || 0;
    const deposito = Number(d.deposito) || 0;
    const totalPersona = efectivo + deposito;

    filas += `
      <tr>
        <td>${contador++}</td>
        <td>${d.nombre}</td>
        <td>${formato(cooperacion)}</td>
        <td>${formato(efectivo)}</td>
        <td>${formato(deposito)}</td>
        <td>${formato(totalPersona)}</td>
      </tr>
    `;

    totalC += cooperacion;
    totalE += efectivo;
    totalD += deposito;
  });

  tabla.innerHTML = filas;

document.getElementById("totalC").innerText = formato(totalC);
document.getElementById("totalE").innerText = formato(totalE);
document.getElementById("totalD").innerText = formato(totalD);
document.getElementById("totalGeneral").innerText = formato(totalE + totalD);

  const totalGeneral = totalE + totalD;
  const faltante = meta - totalGeneral;
  const porcentaje = ((totalGeneral / meta) * 100).toFixed(2);

  document.getElementById("totales").innerHTML = `
    Total Cooperación: ${formato(totalC)} <br>
    Total Efectivo: ${formato(totalE)} <br>
    Total Depósito: ${formato(totalD)} <br>
    <strong>Total Reunido: ${formato(totalGeneral)}</strong><br>
    Meta: ${formato(meta)}<br>
    Faltante: ${formato(faltante)}
  `;

  // barra progreso
  const barra = document.getElementById("barraProgreso");
  barra.style.width = porcentaje + "%";
  barra.innerHTML = porcentaje + "%";

  // gráfica
  const ctx = document.getElementById("grafica");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['Reunido', 'Meta'],
      datasets: [{
        data: [totalGeneral, meta]
      }]
    }
  });
}

// 🔍 BUSCADOR
document.getElementById("buscador").addEventListener("keyup", e => {
  const texto = e.target.value.toLowerCase();
  const filtrados = datosGlobales.filter(d =>
    d.nombre.toLowerCase().includes(texto)
  );
  renderTabla(filtrados);
});

// 📥 EXPORTAR EXCEL
window.exportarExcel = function() {
  const ws = XLSX.utils.table_to_sheet(document.getElementById("miTabla"));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Cooperaciones");
  XLSX.writeFile(wb, "cooperaciones.xlsx");
}

window.exportarPDF = function() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  // 📅 Fecha actual
  const fecha = new Date().toLocaleDateString();

  // 🧾 TÍTULO
  doc.setFontSize(18);
  doc.text("REPORTE DE COOPERACIONES", 105, 15, null, null, "center");

  // 📅 FECHA
  doc.setFontSize(10);
  doc.text("Fecha: " + fecha, 14, 25);

  // 📊 TABLA
  doc.autoTable({
    html: '#miTabla',
    startY: 30,
    theme: 'grid',
    headStyles: { fillColor: [44, 62, 80] },
    styles: { fontSize: 8 }
  });

  // 🔢 OBTENER TOTALES DESDE LA TABLA
  let totalC = 0, totalE = 0, totalD = 0;

  document.querySelectorAll("#tabla tr").forEach(tr => {
    const tds = tr.querySelectorAll("td");

    if (tds.length >= 5) {
      const cooperacion = parseFloat(tds[2].innerText.replace(/[^0-9.-]+/g,"")) || 0;
      const efectivo = parseFloat(tds[3].innerText.replace(/[^0-9.-]+/g,"")) || 0;
      const deposito = parseFloat(tds[4].innerText.replace(/[^0-9.-]+/g,"")) || 0;

      totalC += cooperacion;
      totalE += efectivo;
      totalD += deposito;
    }
  });

  const totalGeneral = totalE + totalD;
  const meta = 661154.46;
  const faltante = meta - totalGeneral;

  let finalY = doc.lastAutoTable.finalY + 10;

  // 💰 RESUMEN
  doc.setFontSize(12);
  doc.text("RESUMEN", 14, finalY);

  doc.setFontSize(10);
  finalY += 6;

  doc.text(`Total Cooperación: $${totalC.toLocaleString()}`, 14, finalY);
  finalY += 6;

  doc.text(`Total Efectivo: $${totalE.toLocaleString()}`, 14, finalY);
  finalY += 6;

  doc.text(`Total Depósito: $${totalD.toLocaleString()}`, 14, finalY);
  finalY += 6;

  doc.text(`Total Reunido: $${totalGeneral.toLocaleString()}`, 14, finalY);
  finalY += 6;

  doc.text(`Meta: $${meta.toLocaleString()}`, 14, finalY);
  finalY += 6;

  doc.text(`Faltante: $${faltante.toLocaleString()}`, 14, finalY);

  // ✍️ FIRMA (opcional)
  finalY += 20;
  doc.text("__________________________", 14, finalY);
  doc.text("Firma", 14, finalY + 5);

  // 💾 GUARDAR
// 📊 AGREGAR GRÁFICA AL PDF
const canvas = document.getElementById("grafica");
const imgData = canvas.toDataURL("image/png");

doc.addPage();
doc.setFontSize(14);
doc.text("Gráfica de Avance", 14, 15);
doc.addImage(imgData, "PNG", 15, 25, 180, 100);
  doc.save("reporte_cooperaciones.pdf");
}

</script>

</body>
</html>
