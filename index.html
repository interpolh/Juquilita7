<style>
body{

    background:#f4f6f9;

/* HEADER */
header{
    background:linear-gradient(135deg,#2c3e50,#3498db);
    color:white;
    padding:15px;
    text-align:center;
    font-size:16px;
}

.container{

}

.card:active{

}

.card i{

    color:#3498db;

    color:#7f8c8d;
    font-size:12px;
    display:flex;
    flex-direction:column;
    align-items:center;
    transition:0.3s;
}

.bottom-nav a i{
    font-size:20px;
    margin-bottom:3px;
}

.bottom-nav a:hover,
.bottom-nav a.active{
    color:#3498db;
}

</div>

     <div class="card" onclick="location.href='dashboard.html'">
