<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juquilita App</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
    margin:0;
    font-family:'Poppins', sans-serif;
    background:#eef2f7;
}

/* HEADER APP */
.header{
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    color:white;
    padding:20px;
    border-bottom-left-radius:25px;
    border-bottom-right-radius:25px;
}

.header h2{
    margin:0;
    font-size:18px;
}

.header p{
    margin:5px 0 0;
    font-size:13px;
    opacity:0.8;
}

/* TARJETA SALDO */
.balance{
    background:white;
    margin: -30px 20px 20px;
    padding:20px;
    border-radius:20px;
    box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

.balance h3{
    margin:0;
    font-size:14px;
    color:#888;
}

.balance h1{
    margin:5px 0 0;
    color:#2a5298;
}

/* ACCIONES */
.actions{
    display:flex;
    justify-content:space-around;
    margin:20px;
}

.action{
    background:white;
    padding:15px;
    border-radius:15px;
    text-align:center;
    width:70px;
    box-shadow:0 5px 10px rgba(0,0,0,0.1);
    cursor:pointer;
    transition:0.3s;
}

.action:active{
    transform:scale(0.9);
}

.action i{
    font-size:20px;
    color:#2a5298;
}

/* LISTA */
.list{
    padding:20px;
}

.item{
    background:white;
    padding:15px;
    border-radius:15px;
    margin-bottom:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 5px 10px rgba(0,0,0,0.08);
}

/* BOTÓN FLOTANTE */
.fab{
    position:fixed;
    bottom:80px;
    right:20px;
    background:#2a5298;
    color:white;
    width:55px;
    height:55px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:22px;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
    cursor:pointer;
    transition:0.3s;
}

.fab:active{
    transform:scale(0.9);
}

/* MENÚ INFERIOR */
.nav{
    position:fixed;
    bottom:0;
    width:100%;
    background:white;
    display:flex;
    justify-content:space-around;
    padding:10px 0;
    box-shadow:0 -3px 10px rgba(0,0,0,0.1);
}

.nav a{
    text-decoration:none;
    color:#888;
    font-size:12px;
    display:flex;
    flex-direction:column;
    align-items:center;
}

.nav a i{
    font-size:20px;
}

.nav a.active{
    color:#2a5298;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <h2>COLONIA JUQUILITA SECCIÓN 7</h2>
    <p>Control de Cooperaciones</p>
</div>

<!-- SALDO -->
<div class="balance">
    <h3>Saldo total</h3>
    <h1>$ 12,500</h1>
</div>

<!-- ACCIONES -->
<div class="actions">
    <div class="action" onclick="location.href='Depositos.html'">
        <i class="fas fa-plus"></i>
        <div>Agregar</div>
    </div>

    <div class="action" onclick="location.href='gastos.html'">
        <i class="fas fa-minus"></i>
        <div>Gastos</div>
    </div>

    <div class="action" onclick="location.href='Proyecto.html'">
        <i class="fas fa-chart-line"></i>
        <div>Proyectos</div>
    </div>

    <div class="action" onclick="location.href='dashboard.html'">
        <i class="fas fa-chart-pie"></i>
        <div>Resumen</div>
    </div>
</div>

<!-- MOVIMIENTOS -->
<div class="list">
    <div class="item">
        <span>Depósito Juan</span>
        <strong>$200</strong>
    </div>

    <div class="item">
        <span>Compra material</span>
        <strong>-$500</strong>
    </div>
</div>

<!-- BOTÓN FLOTANTE -->
<div class="fab" onclick="location.href='Depositos.html'">
    <i class="fas fa-plus"></i>
</div>

<!-- MENÚ -->
<div class="nav">
    <a href="dashboard.html"><i class="fas fa-home"></i>Inicio</a>
    <a href="Depositos.html"><i class="fas fa-dollar-sign"></i>Depósitos</a>
    <a href="gastos.html"><i class="fas fa-wallet"></i>Gastos</a>
    <a href="Proyecto.html"><i class="fas fa-chart-line"></i>Proyectos</a>
    <a href="index2.html"><i class="fas fa-bars"></i>Más</a>
</div>

</body>
</html>
