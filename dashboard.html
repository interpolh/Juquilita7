<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juquilita App</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
body { font-family: 'Segoe UI', sans-serif; background: #eef2f7; margin: 0; }
header { background: #2c3e50; color: white; padding: 15px; text-align: center; font-size: 20px; }
.container { padding: 15px; }
.card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); }
input { padding: 12px; width: 100%; border-radius: 10px; border: 1px solid #ccc; margin-bottom: 10px; }
button { padding: 10px; border: none; border-radius: 10px; background: #3498db; color: white; margin: 5px; cursor:pointer; }
.persona { background: white; border-radius: 12px; padding: 12px; margin-bottom: 10px; box-shadow: 0px 2px 8px rgba(0,0,0,0.1); }
.nombre { font-weight: bold; font-size: 16px; }
.monto { font-size: 14px; color: #555; }
.progreso { background: #ddd; border-radius: 20px; overflow: hidden; }
.barra { height: 25px; background: green; color: white; text-align: center; }
.btn-menu { position: fixed; bottom: 20px; right: 20px; background: #2c3e50; color: white; border-radius: 50%; width: 55px; height: 55px; font-size: 20px; }
</style>
</head>

<body>
<header>Colonia Juquilita Sección 7</header>

<div class="container">

<div class="card">
<button onclick="filtrar('todos')">Todos</button>
<button onclick="filtrar('pagados')">🟢 Pagados</button>
<button onclick="filtrar('parciales')">🟡 Parciales</button>
<button onclick="filtrar('pendientes')">🔴 Pendientes</button>
</div>

<div class="card">
<input type="text" id="buscador" placeholder="🔍 Buscar...">
<button onclick="exportarExcel()">📥 Excel</button>
<button onclick="exportarPDF()">📄 PDF</button>
</div>

<div id="lista"></div>

<div class="card">
<h3 id="totales"></h3>
</div>

<div class="card">
<h3>Progreso</h3>
<div class="progreso">
<div id="barraProgreso" class="barra">0%</div>
</div>
</div>

<div class="card">
<canvas id="grafica"></canvas>
</div>

</div>

<button onclick="window.location.href='index.html'" class="btn-menu">🏠</button>

<script>
// REEMPLAZA ESTO CON TU CONFIGURACIÓN REAL DE FIREBASE
const firebaseConfig = {
  apiKey: "TU_API_KEY_REAL",
  authDomain: "cooperaciones-juquilita.firebaseapp.com",
  projectId: "cooperaciones-juquilita",
  storageBucket: "cooperaciones-juquilita.appspot.com",
  messagingSenderId: "TU_MESSAGING_SENDER_ID",
  appId: "TU_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const lista = document.getElementById("lista");
const meta = 661154.46;
let datosGlobales = [];
let datosFiltradosActuales = [];
let chart;

// FILTRADO POR RANGOS
function filtrar(tipo) {
  let filtrados = [];

  if (tipo === "todos") filtrados = datosGlobales;
  if (tipo === "pendientes") filtrados = datosGlobales.filter(d => {
    const total = (d.efectivo || 0) + (d.deposito || 0);
    return total >= 0 && total < 5000;
  });
  if (tipo === "parciales") filtrados = datosGlobales.filter(d => {
    const total = (d.efectivo || 0) + (d.deposito || 0);
    return total >= 5000 && total <= 9900;
  });
  if (tipo === "pagados") filtrados = datosGlobales.filter(d => {
    const total = (d.efectivo || 0) + (d.deposito || 0);
    return total >= 10000;
  });

  render(filtrados);
}

// FORMATO MONEDA
const formato = n => n.toLocaleString('es-MX', { style: 'currency', currency: 'MXN' });

// CARGAR DATOS FIRESTORE
db.collection("cooperaciones").onSnapshot(snapshot => {
  datosGlobales = [];
  snapshot.forEach(doc => datosGlobales.push(doc.data()));
  render(datosGlobales);
});

// RENDER LISTA
function render(datos) {
  datosFiltradosActuales = datos;
  lista.innerHTML = "";

  let totalC = 0, totalE = 0, totalD = 0;

  datos.forEach(d => {
    const coop = d.cooperacion || 0;
    const efec = d.efectivo || 0;
    const dep = d.deposito || 0;
    const total = efec + dep;

    let estado = total >= 10000 ? "🟢 Pagado" : total >= 5000 ? "🟡 Parcial" : "🔴 Pendiente";
    let color = total >= 10000 ? "#2ecc71" : total >= 5000 ? "#f39c12" : "#e74c3c";

    lista.innerHTML += `
      <div class="persona" style="border-left: 6px solid ${color}">
        <div class="nombre">${d.nombre}</div>
        <div class="monto">Cooperación: ${formato(coop)}</div>
        <div class="monto">Efectivo: ${formato(efec)}</div>
        <div class="monto">Depósito: ${formato(dep)}</div>
        <div class="monto"><strong>Total: ${formato(total)}</strong></div>
        <div style="margin-top:5px;font-weight:bold;color:${color}">${estado}</div>
      </div>
    `;

    totalC += coop; totalE += efec; totalD += dep;
  });

  const totalGeneral = totalE + totalD;
  const faltante = meta - totalGeneral;
  const porcentaje = ((totalGeneral / meta) * 100).toFixed(2);

  document.getElementById("totales").innerHTML = `
    Total: ${formato(totalGeneral)}<br>
    Meta: ${formato(meta)}<br>
    Faltante: ${formato(faltante)}
  `;

  const barra = document.getElementById("barraProgreso");
  barra.style.width = porcentaje + "%";
  barra.innerHTML = porcentaje + "%";

  if(chart) chart.destroy();
  chart = new Chart(document.getElementById("grafica"), {
    type: 'bar',
    data: { labels: ['Reunido', 'Meta'], datasets: [{ data: [totalGeneral, meta] }] }
  });
}

// BUSCADOR
document.getElementById("buscador").addEventListener("keyup", e => {
  const texto = e.target.value.toLowerCase();
  const filtrados = datosGlobales.filter(d =>
    d.nombre.toLowerCase().includes(texto)
  );
  render(filtrados);
});

// EXPORTAR EXCEL
function exportarExcel() {
  let csv = "Nombre,Cooperación,Efectivo,Depósito,Total,Estado\n";
  datosFiltradosActuales.forEach(d => {
    const coop = d.cooperacion || 0;
    const efec = d.efectivo || 0;
    const dep = d.deposito || 0;
    const total = efec + dep;
    const estado = total >= 10000 ? "Pagado" : total >= 5000 ? "Parcial" : "Pendiente";
    csv += `${d.nombre},${coop},${efec},${dep},${total},${estado}\n`;
  });
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = "cooperaciones.csv";
  a.click();
  URL.revokeObjectURL(a.href);
}

// EXPORTAR PDF

function exportarPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.setFontSize(14);
  doc.text("Listado de Cooperaciones", 14, 15);

  // Preparar datos para la tabla
  const data = datosFiltradosActuales.map(d => {
    const coop = d.cooperacion || 0;
    const efec = d.efectivo || 0;
    const dep = d.deposito || 0;
    const total = efec + dep;
    let estado = "";
    let color = "";
    
    if(total >= 10000) { estado = "Pagado"; color = "#2ecc71"; }
    else if(total >= 5000) { estado = "Parcial"; color = "#f39c12"; }
    else { estado = "Pendiente"; color = "#e74c3c"; }

    return [
      d.nombre,
      coop.toLocaleString('es-MX', { style: 'currency', currency: 'MXN' }),
      efec.toLocaleString('es-MX', { style: 'currency', currency: 'MXN' }),
      dep.toLocaleString('es-MX', { style: 'currency', currency: 'MXN' }),
      total.toLocaleString('es-MX', { style: 'currency', currency: 'MXN' }),
      estado,
      color // guardamos el color para usar en la tabla
    ];
  });

  // Generar tabla con autoTable
  doc.autoTable({
    startY: 20,
    head: [['Nombre', 'Cooperación', 'Efectivo', 'Depósito', 'Total', 'Estado']],
    body: data,
    didParseCell: function (data) {
      // Colorear la columna Estado según color
      if (data.column.index === 5) { 
        const color = data.row.raw[6];
        data.cell.styles.fillColor = color;
        data.cell.styles.textColor = 255; // blanco para contraste
      }
    },
    theme: 'grid',
    headStyles: { fillColor: '#3498db', textColor: 255 }
  });

  doc.save("cooperaciones.pdf");
}





</script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js");
}
</script>

</body>
</html>
