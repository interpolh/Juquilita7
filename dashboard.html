<!DOCTYPE html>
<html lang="es">
<head>
<link rel="manifest" href="manifest.json">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Juquilita App</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #eef2f7;
  margin: 0;
}

/* HEADER */
header {
  background: #2c3e50;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
}

/* CONTENEDOR */
.container {
  padding: 15px;
}

/* TARJETAS */
.card {
  background: white;
  border-radius: 15px;
  padding: 15px;
  margin-bottom: 15px;
  box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
}

/* INPUT */
input {
  padding: 12px;
  width: 100%;
  border-radius: 10px;
  border: 1px solid #ccc;
  margin-bottom: 10px;
}

/* BOTONES */
button {
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #3498db;
  color: white;
  margin: 5px;
}

/* LISTA TIPO APP */
.persona {
  background: white;
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 10px;
  box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
}

.nombre {
  font-weight: bold;
  font-size: 16px;
}

.monto {
  font-size: 14px;
  color: #555;
}

/* PROGRESO */
.progreso {
  background: #ddd;
  border-radius: 20px;
  overflow: hidden;
}

.barra {
  height: 25px;
  background: green;
  color: white;
  text-align: center;
}

/* BOTÓN FLOTANTE */
.btn-menu {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #2c3e50;
  color: white;
  border-radius: 50%;
  width: 55px;
  height: 55px;
  font-size: 20px;
}

</style>
</head>

<body>

<header>Colonia Juquilita Sección 7</header>

<div class="container">

<div class="card">
<button onclick="filtrar('todos')">Todos</button>
<button onclick="filtrar('alCorriente')">🟢 Al corriente</button>
<button onclick="filtrar('parciales')">🟡 Parciales</button>
<button onclick="filtrar('pendientes')">🔴 Pendientes</button>

<div class="card">
<input type="text" id="buscador" placeholder="🔍 Buscar...">

<button onclick="exportarExcel()">📥 Excel</button>
<button onclick="exportarPDF()">📄 PDF</button>
</div>

<!-- LISTA -->
<div id="lista"></div>

<div class="card">
<h3 id="totales"></h3>
</div>

<div class="card">
<h3>Progreso</h3>
<div class="progreso">
<div id="barraProgreso" class="barra">0%</div>
</div>
</div>

<div class="card">
<canvas id="grafica"></canvas>
</div>

</div>

<button onclick="window.location.href='index.html'" class="btn-menu">🏠</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "cooperaciones-juquilita.firebaseapp.com",
  projectId: "cooperaciones-juquilita"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const lista = document.getElementById("lista");
const meta = 661154.46;

let datosGlobales = [];
let chart;



window.filtrar = function(tipo) {
  let filtrados = [];

  if (tipo === "todos") {
    filtrados = datosGlobales;
  }

  if (tipo === "alCorriente") { // antes "pagados"
    filtrados = datosGlobales.filter(d =>
      (d.efectivo + d.deposito) >= d.cooperacion
    );
  }

  if (tipo === "parciales") {
    filtrados = datosGlobales.filter(d =>
      (d.efectivo + d.deposito) > 0 &&
      (d.efectivo + d.deposito) < d.cooperacion
    );
  }

  if (tipo === "pendientes") {
    filtrados = datosGlobales.filter(d =>
      (d.efectivo + d.deposito) === 0
    );
  }

  render(filtrados);
}



  render(filtrados);
}

  render(filtrados);
}



const formato = (n) => n.toLocaleString('es-MX', { style: 'currency', currency: 'MXN' });

onSnapshot(collection(db, "cooperaciones"), (snapshot) => {
  datosGlobales = [];

  snapshot.forEach(doc => {
    datosGlobales.push(doc.data());
  });

  render(datosGlobales);
});

function render(datos) {

  lista.innerHTML = "";

  let totalC = 0, totalE = 0, totalD = 0;

  datos.forEach(d => {

    const coop = d.cooperacion || 0;
    const efec = d.efectivo || 0;
    const dep = d.deposito || 0;
    const total = efec + dep;

    let estado = "";
    let color = "";

    if (total >= coop && coop > 0) {
      estado = "🟢 Pagado";
      color = "#2ecc71";
    } else if (total > 0) {
      estado = "🟡 Parcial";
      color = "#f39c12";
    } else {
      estado = "🔴 Pendiente";
      color = "#e74c3c";
    }

    lista.innerHTML += `
      <div class="persona" style="border-left: 6px solid ${color}">
        <div class="nombre">${d.nombre}</div>
        <div class="monto">Cooperación: ${formato(coop)}</div>
        <div class="monto">Efectivo: ${formato(efec)}</div>
        <div class="monto">Depósito: ${formato(dep)}</div>
        <div class="monto"><strong>Total: ${formato(total)}</strong></div>
        <div style="margin-top:5px;font-weight:bold;color:${color}">
          ${estado}
        </div>
      </div>
    `;

    totalC += coop;
    totalE += efec;
    totalD += dep;
  });

  const totalGeneral = totalE + totalD;
  const faltante = meta - totalGeneral;
  const porcentaje = ((totalGeneral / meta) * 100).toFixed(2);

  document.getElementById("totales").innerHTML = `
    Total: ${formato(totalGeneral)}<br>
    Meta: ${formato(meta)}<br>
    Faltante: ${formato(faltante)}
  `;

  const barra = document.getElementById("barraProgreso");
  barra.style.width = porcentaje + "%";
  barra.innerHTML = porcentaje + "%";

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("grafica"), {
    type: 'bar',
    data: {
      labels: ['Reunido', 'Meta'],
      datasets: [{ data: [totalGeneral, meta] }]
    }
  });
}


// BUSCADOR
document.getElementById("buscador").addEventListener("keyup", e => {
  const texto = e.target.value.toLowerCase();
  const filtrados = datosGlobales.filter(d =>
    d.nombre.toLowerCase().includes(texto)
  );
  render(filtrados);
});

</script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js");
}
</script>

</body>
</html>
