<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADMIN - Cooperaciones</title>

<style>
body { font-family: Arial; background: #eef2f7; padding: 20px; }
h2 { text-align: center; }

.card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; }

input { padding: 8px; margin: 5px; width: 95%; }

button { padding: 8px; margin: 5px; border: none; border-radius: 6px; cursor: pointer; }

.guardar { background: #27ae60; color: white; }
.cancelar { background: #e74c3c; color: white; }
.editar { background: #3498db; color: white; }
.eliminar { background: #c0392b; color: white; }

table { width: 100%; border-collapse: collapse; background: white; }

th { background: #2c3e50; color: white; }

td, th { padding: 8px; text-align: center; }

tr:nth-child(even) { background: #f2f2f2; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="card">
  <h3>🔐 Acceso Administrador</h3>
  <input type="email" id="email" placeholder="Correo">
  <input type="password" id="password" placeholder="Contraseña">
  <button onclick="login()">Entrar</button>
</div>

<!-- CONTENIDO -->
<div id="contenido" style="display:none;">

<h2>Panel Administrador</h2>
<button onclick="logout()">Cerrar sesión</button>

<!-- FORMULARIO -->
<div class="card">
<form id="formulario">
  <input type="hidden" id="docId">
  <input type="text" id="nombre" placeholder="Nombre" required>
  <input type="number" id="cooperacion" placeholder="Cooperación">
  <input type="number" id="efectivo" placeholder="Efectivo">
  <input type="number" id="deposito" placeholder="Depósito">

  <button type="submit" class="guardar">Guardar</button>
  <button type="button" onclick="cancelarEdicion()" class="cancelar">Cancelar</button>
</form>
</div>

<!-- BUSCADOR -->
<div class="card">
<input type="text" id="buscador" placeholder="🔍 Buscar por nombre...">
</div>

<!-- TABLA -->
<div class="card">
<table>
<thead>
<tr>
<th>Nombre</th>
<th>Coop</th>
<th>Efectivo</th>
<th>Depósito</th>
<th>Total</th>
<th>Acciones</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

<!-- GASTOS -->
<div class="card">
  <h3>💸 Registrar Gasto / Retiro</h3>
  <input type="text" id="descGasto" placeholder="Descripción">
  <input type="number" id="montoGasto" placeholder="Monto">
  <button onclick="guardarGasto()" class="guardar">Guardar gasto</button>
</div>

<div class="card">
  <h3>📋 Lista de Gastos</h3>
  <table>
    <thead>
      <tr>
        <th>Descripción</th>
        <th>Monto</th>
        <th>Acción</th>
      </tr>
    </thead>
    <tbody id="tablaGastos"></tbody>
  </table>
</div>

<!-- TOTALES -->
<div class="card">
<h3 id="totales"></h3>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBboR7L9QYBF0VMI6kd4EahImEDnIbiV-U",
  authDomain: "cooperaciones-juquilita.firebaseapp.com",
  projectId: "cooperaciones-juquilita",
  storageBucket: "cooperaciones-juquilita.firebasestorage.app",
  messagingSenderId: "836131757319",
  appId: "1:836131757319:web:70f93a56ccf152062bf9a2"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const ADMIN_EMAIL = "TU_CORREO";

// LOGIN
window.login = () => {
  const email = emailInput.value;
  const pass = password.value;
  signInWithEmailAndPassword(auth, email, pass).catch(() => alert("Error"));
};

// VALIDAR
onAuthStateChanged(auth, user => {
  if (user && user.email === ADMIN_EMAIL) {
    login.style.display = "none";
    contenido.style.display = "block";
  } else {
    contenido.style.display = "none";
    login.style.display = "block";
  }
});

window.logout = () => signOut(auth);

const formato = n => n.toLocaleString('es-MX', { style: 'currency', currency: 'MXN' });

const tabla = document.getElementById("tabla");
const tablaGastos = document.getElementById("tablaGastos");

let datosGlobales = [];
let gastosGlobal = 0;

// GUARDAR COOPERACIONES
formulario.addEventListener("submit", async e => {
  e.preventDefault();

  const id = docId.value;
  const nombre = nombreInput.value.trim();

  const q = query(collection(db, "cooperaciones"), where("nombre", "==", nombre));
  const snap = await getDocs(q);

  if (!snap.empty && !id) return alert("Nombre duplicado");

  const datos = {
    nombre,
    cooperacion: Number(cooperacion.value) || 0,
    efectivo: Number(efectivo.value) || 0,
    deposito: Number(deposito.value) || 0
  };

  if (id) {
    await updateDoc(doc(db, "cooperaciones", id), datos);
  } else {
    await addDoc(collection(db, "cooperaciones"), datos);
  }

  formulario.reset();
  docId.value = "";
});

// LEER COOPERACIONES
onSnapshot(collection(db, "cooperaciones"), snap => {
  datosGlobales = [];
  snap.forEach(d => datosGlobales.push({ id: d.id, ...d.data() }));
  render();
});

// GUARDAR GASTOS
window.guardarGasto = async () => {
  const desc = descGasto.value;
  const monto = Number(montoGasto.value) || 0;

  if (!desc || monto <= 0) return alert("Datos incorrectos");

  await addDoc(collection(db, "gastos"), { descripcion: desc, monto });

  descGasto.value = "";
  montoGasto.value = "";
};

// LEER GASTOS
onSnapshot(collection(db, "gastos"), snap => {
  tablaGastos.innerHTML = "";
  gastosGlobal = 0;

  snap.forEach(d => {
    const g = d.data();
    gastosGlobal += g.monto;

    tablaGastos.innerHTML += `
      <tr>
        <td>${g.descripcion}</td>
        <td>${formato(g.monto)}</td>
        <td><button class="eliminar" onclick="eliminarGasto('${d.id}')">Eliminar</button></td>
      </tr>
    `;
  });

  render();
});

// ELIMINAR GASTO
window.eliminarGasto = async id => {
  await deleteDoc(doc(db, "gastos", id));
};

// RENDER
function render() {
  tabla.innerHTML = "";

  let totalC = 0, totalE = 0, totalD = 0;

  datosGlobales.forEach(d => {
    const total = d.cooperacion + d.efectivo + d.deposito;

    tabla.innerHTML += `
      <tr>
        <td>${d.nombre}</td>
        <td>${formato(d.cooperacion)}</td>
        <td>${formato(d.efectivo)}</td>
        <td>${formato(d.deposito)}</td>
        <td>${formato(total)}</td>
        <td>
          <button class="eliminar" onclick="eliminar('${d.id}')">Eliminar</button>
        </td>
      </tr>
    `;

    totalC += d.cooperacion;
    totalE += d.efectivo;
    totalD += d.deposito;
  });

  const bruto = totalC + totalE + totalD;
  const neto = bruto - gastosGlobal;

  totales.innerHTML = `
    Cooperación: ${formato(totalC)} <br>
    Efectivo: ${formato(totalE)} <br>
    Depósito: ${formato(totalD)} <br>
    💸 Gastos: ${formato(gastosGlobal)} <br>
    <strong>Total Neto: ${formato(neto)}</strong>
  `;
}
</script>

</body>
</html>
