<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Visor PDF</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <style>
    body {
      margin: 0;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
    }
    #visor-pdf {
      width: 90%;
      max-width: 900px;
      margin: 20px 0;
    }
    canvas {
      display: block;
      margin: 20px auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>
  <div id="visor-pdf"></div>

  <script>
    const url = 'documento.pdf'; // tu archivo PDF
    const visor = document.getElementById('visor-pdf');

    pdfjsLib.getDocument(url).promise.then(pdf => {
      console.log(`Número de páginas: ${pdf.numPages}`);
      // Mostrar cada página
      for (let i = 1; i <= pdf.numPages; i++) {
        pdf.getPage(i).then(page => {
          const scale = 1.5;
          const viewport = page.getViewport({ scale: scale });
          const canvas = document.createElement('canvas');
          const context = canvas.getContext('2d');
          canvas.height = viewport.height;
          canvas.width = viewport.width;
          visor.appendChild(canvas);
          page.render({canvasContext: context, viewport: viewport});
        });
      }
    }).catch(err => {
      visor.innerHTML = `<p style="color:red;">Error al cargar el PDF: ${err}</p>`;
    });
  </script>
</body>
</html>
