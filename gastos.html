<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Visor PDF</title>
   <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#2c3e50">

  <!-- Estilos para el botón flotante -->
  <style>
    /* Botón flotante de inicio */
    .btn-flotante {
      position: fixed;
      bottom: 25px;
      right: 25px;
      background: #2c3e50;
      color: white;
      border: none;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      font-size: 24px;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      transition: transform 0.2s, background 0.3s;
      z-index: 1000; /* Siempre encima del contenido */
    }

    /* Efecto hover */
    .btn-flotante:hover {
      background: #3498db;
      transform: scale(1.1);
    }
  </style>



  

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <style>
    body {
      margin: 0;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
    }
    #visor-pdf {
      width: 90%;
      max-width: 900px;
      margin: 20px 0;
    }
    canvas {
      display: block;
      margin: 20px auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>
  <div id="visor-pdf"></div>

  <script>
    const url = 'documento.pdf'; // tu archivo PDF
    const visor = document.getElementById('visor-pdf');

    pdfjsLib.getDocument(url).promise.then(pdf => {
      console.log(`Número de páginas: ${pdf.numPages}`);
      // Mostrar cada página
      for (let i = 1; i <= pdf.numPages; i++) {
        pdf.getPage(i).then(page => {
          const scale = 1.5;
          const viewport = page.getViewport({ scale: scale });
          const canvas = document.createElement('canvas');
          const context = canvas.getContext('2d');
          canvas.height = viewport.height;
          canvas.width = viewport.width;
          visor.appendChild(canvas);
          page.render({canvasContext: context, viewport: viewport});
        });
      }
    }).catch(err => {
      visor.innerHTML = `<p style="color:red;">Error al cargar el PDF: ${err}</p>`;
    });
  </script>


  <!-- Botón flotante de inicio -->
<button id="btnInicio" class="btn-flotante" title="Ir al inicio">🏠</button>

<!-- Scripts -->
<script>
  // Registrar Service Worker
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js");
  }

  // Esperar a que el DOM cargue antes de añadir el evento
  document.addEventListener("DOMContentLoaded", () => {
    document.getElementById('btnInicio').addEventListener('click', () => {
      window.location.href = 'index.html'; // Página de inicio
    });
  });
</script>

</body>
</html>
